<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./src/style.css">
  <link rel="icon" type="image/x-icon" href="./public/5375853.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <title>snake_typescript</title>
</head>

<body>
  <div class="main_content">
    <div class="header">
      <h1>Игра змейка!</h1>
    </div>
    <div class="audio-player">
      <div class="player-title">NOW PLAYING: <span id="track-name">TRACK 1</span></div>
      <audio id="bgm" src="/track1.mp3" loop></audio>
      <div class="player-controls">
        <div class="volume-control">
          <label for="volume-slider">ГРОМКОСТЬ</label>
          <input type="range" id="volume-slider" min="0" max="100" value="70">
        </div>
        <button id="btn-prev">Назад</button>
        <button id="btn-play">Играть</button>
        <button id="btn-next">Вперед</button>
      </div>
    </div>
    <div class="controls-button">
      <h6>Управление со стрелочек клавиатуры</h6>
    </div>
    <div class="btnPlayGame">
      <button id='btn-play-game'>Играть!</button>
    </div>
    <img src="./public/выфpng.png" alt="Фото змеи пеэнгэ">


    <div id="game-container" style="display: none;">
      <canvas id="gameCanvas" width="400" height="400"></canvas>

      <div id="mobile-controls">
        <div class="controls-row">
          <button class="ctrl-btn" data-dir="up">▲</button>
        </div>
        <div class="controls-row">
          <button class="ctrl-btn" data-dir="left">◄</button>
          <button class="ctrl-btn" data-dir="down">▼</button>
          <button class="ctrl-btn" data-dir="right">►</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>

</body>

</html>
